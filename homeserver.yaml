# Configuration file for Synapse.
#
# This is a YAML file: see [1] for a quick introduction. Note in particular
# that *indentation is important*: all the elements of a list or dictionary
# should have the same indentation.
#
# [1] https://docs.ansible.com/ansible/latest/reference_appendices/YAMLSyntax.html
#
# For more information on how to configure Synapse, including a complete accounting of
# each option, go to docs/usage/configuration/config_documentation.md or
# https://element-hq.github.io/synapse/latest/usage/configuration/config_documentation.html
server_name: "api.stemverse.app"
pid_file: /home/ec2-user/synapse-native/Matrix-Backend/homeserver.pid

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    # CHANGE: This allows traffic from the internet/AWS
    bind_addresses: ['0.0.0.0'] 
    resources:
      - names: [client, federation]
        compress: false

# ADD: This stops the Android App from hanging on "Syncing..."
public_baseurl: "https://api.stemverse.app/"

database:
  name: sqlite3
  args:
    database: /home/ec2-user/synapse-native/Matrix-Backend/homeserver.db

log_config: "/home/ec2-user/synapse-native/Matrix-Backend/localhost.log.config"
media_store_path: /home/ec2-user/synapse-native/Matrix-Backend/media_store
registration_shared_secret: "jx:*Wq_7fVM.E4*gCFKjz1-N*cVIfBs6aZ-XG~FZ4:me,c:3^l"
report_stats: false
macaroon_secret_key: "XS4__qfE_burXq,#QC5GZ^F&L0MkeU0czujFGYyLjCJ1M@h_BI"
form_secret: "1ZaCV6Fi9yNrfu@DReQNiW=N7XlFZD_z9nZ6*IS-KqgnPN*Ml#"
signing_key_path: "/home/ec2-user/synapse-native/Matrix-Backend/localhost.signing.key"
trusted_key_servers:
  - server_name: "matrix.org"

# StemWorld Custom Logic
allow_numeric_ids: true
enable_registration: true
enable_registration_without_verification: true
user_directory:
  enabled: true
  search_all_users: true
